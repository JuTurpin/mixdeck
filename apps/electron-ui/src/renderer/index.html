<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>MixDeck</title>
    <style>
      @keyframes mixdeck-platter-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      button {
        background: #1c1f26;
        color: #e8e9ec;
        border: 1px solid #2a2d35;
        border-radius: 4px;
        padding: 4px 10px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.4;
        cursor: default;
      }
    </style>
  </head>
  <body style="margin: 0; background: #0d0e11;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
